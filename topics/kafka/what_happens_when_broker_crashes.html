<div class="wrap">
  <h1>What happens when broker crashes?</h1>
  <p>When a broker crashes, the cluster controller detects the failure and triggers a Leader Election for all affected partitions. It picks the first available Follower in the ISR and promotes it to be the new Leader.</p>
