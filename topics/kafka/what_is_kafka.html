  <h1>What is Kafka?</h1>
  <p>Apache Kafka is an open-source distributed event streaming platform used for high-performance data pipelines, streaming analytics, data integration, and mission-critical applications. Unlike traditional message queues, Kafka acts as an append-only distributed commit log.</p>
