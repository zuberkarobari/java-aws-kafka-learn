  <h1>At Most Once vs At Least Once vs Exactly Once?</h1>
  <p>At Most Once: Commit offset before processing (may lose messages). At Least Once: Process, then commit offset (may duplicate). Exactly Once: Atomic commit of output and offset (used via Kafka Transactions).</p>
