<div class="wrap">
  <h1>What is ISR?</h1>
  <p>ISR stands for In-Sync Replicas. It is the subset of replicas (Followers) that are fully caught up with the Leader partition. Only a broker in the ISR list can be elected as the new Leader if the current one fails.</p>
