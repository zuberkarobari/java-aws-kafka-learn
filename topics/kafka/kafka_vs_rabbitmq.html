<div class="wrap">
  <h1>Why Kafka over RabbitMQ?</h1>
  <p>RabbitMQ is a message broker. Kafka is an event streaming platform. RabbitMQ drops messages once consumed, while Kafka retains them. RabbitMQ excels at complex routing, whereas Kafka excels at massive horizontal scalability and high throughput.</p>
