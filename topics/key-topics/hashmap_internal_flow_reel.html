<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HashMap Internals Reel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="../../css/topic.css" />
  
  <!-- Tailwind CSS preserved for page content -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- inline styles removed by strip_inline_styles.js -->
</head>
<body>
  <main id="topic-content">
    <div class="max-w-4xl mx-auto px-6 md:px-12 py-10 space-y-16 pb-24">
<div id="reel-container">
        <!-- Header -->
        <div class="header" style="position: relative;">
    <a href="../../index.html?pathway=keytopics" style="position: absolute; left: 16px; top: 16px; text-decoration: none; color: var(--text-muted, var(--muted, #8b9eb3)); font-size: 11px; font-family: 'JetBrains Mono', monospace; font-weight: 500; display: flex; align-items: center; gap: 4px; z-index: 1000; transition: opacity 0.2s;">
      <span>←</span> Back
    </a>
            <h1>Java HashMap</h1>
            <p>Internal Working & Big O Time</p>
        </div>

        <!-- Canvas Area -->
        <div class="canvas" id="canvas">
            
            <div id="hash-function">
                <div class="hf-title">Hash Function</div>
                <div class="hf-math">hash(K) & (n-1)</div>
            </div>

            <!-- Array representing buckets -->
            <div id="array-container">
                <!-- Javascript will inject 8 buckets here initially to fit screen visually -->
            </div>

            <!-- Container for flying nodes -->
            <div id="nodes-container"></div>
            
            <div class="query-beam" id="query-beam"></div>
        </div>

        <!-- Text Overlay / Explainer -->
        <div class="explainer-panel">
            <div id="step-badge" class="step-badge">[DATA_STRUCTURES]</div>
            <h2 id="explainer-title" class="explainer-title">Under The Hood</h2>
            <p id="explainer-text" class="explainer-text">A HashMap is considered an O(1) data structure, meaning it finds items instantly. But it's not magic—it's just a heavily optimized array. Let's trace a <code>.put()</code> call.</p>
            
            <button id="btn-next" class="btn-next" onclick="nextStep()">Initialize Map</button>
        </div>
    </div>

    
    </div>
  </main>
<script>
        // DOM Elements
        const arrayContainer = document.getElementById('array-container');
        const nodesContainer = document.getElementById('nodes-container');
        const hashFunctionBox = document.getElementById('hash-function');
        const badge = document.getElementById('step-badge');
        const title = document.getElementById('explainer-title');
        const text = document.getElementById('explainer-text');
        const btnNext = document.getElementById('btn-next');
        let currentStep = 0;
        let isAnimating = false;

        // Visual state tracking
        let nodes = [];

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        function initArray(size) {
            arrayContainer.innerHTML = '';
            for(let i = 0; i < size; i++) {
                const bucket = document.createElement('div');
                bucket.className = 'bucket-slot';
                bucket.id = `bucket-${i}`;
                bucket.innerHTML = `<span class="bucket-index">${i}</span>[ ]`;
                arrayContainer.appendChild(bucket);
            }
        }

        // Create a node element
        function createNode(id, key, val) {
            const node = document.createElement('div');
            node.className = 'map-node';
            node.id = id;
            node.innerHTML = `
                <div class="node-key">${key}</div>
                <div class="node-val">${val}</div>
                <div class="ll-line" id="line-${id}"></div>
            `;
            nodesContainer.appendChild(node);
            nodes.push(node);
            return node;
        }

        // Animate a node from top, through hash, to a specific bucket and offset
        async function animateNode(node, targetBucketIndex, xOffset, yOffset = 0) {
            // Start at top center
            node.style.top = '2%';
            node.style.left = '50%';
            node.style.transform = 'translate(-50%, 0)';
            node.style.opacity = '1';
            
            await sleep(100);
            
            // Move to hash function
            const hfRect = hashFunctionBox.getBoundingClientRect();
            const canvasRect = document.getElementById('canvas').getBoundingClientRect();
            
            node.style.top = (hfRect.top - canvasRect.top + 10) + 'px';
            await sleep(600);
            
            hashFunctionBox.classList.add('hashing');
            hashFunctionBox.querySelector('.hf-math').innerText = `hash("${node.querySelector('.node-key').innerText}") & 15 = ${targetBucketIndex}`;
            await sleep(400);
            hashFunctionBox.classList.remove('hashing');

            // Move to bucket
            const bucket = document.getElementById(`bucket-${targetBucketIndex}`);
            const bRect = bucket.getBoundingClientRect();
            
            node.style.top = (bRect.top - canvasRect.top + 2 + yOffset) + 'px';
            node.style.left = (20 + 40 + xOffset) + 'px'; // 20px left margin + 40px bucket width + offset
            node.style.transform = 'none'; // remove translate
            
            await sleep(600);
        }

        // The Animation Sequence
        const steps = [
            {
                badge: "Phase 1: The Array",
                title: "The Underlying Array",
                text: "When you create an empty HashMap, Java creates a raw Array of 'Buckets' (Node<K,V>[]). The default size is 16. Every key-value pair will live in one of these slots.",
                btn: "Next: Insert Item",
                action: async () => {
                    initArray(8); // Show 8 visually to fit screen nicely, but explain as 16
                    await sleep(400);
                }
            },
            {
                badge: "Phase 2: Indexing",
                title: "The Hash Function",
                text: "Let's insert <code>map.put('Alice', 25)</code>. Java calculates the hash of 'Alice', then applies a bitwise AND <code>(n-1)</code> to compress that huge hash into a valid array index (e.g., Index 2).",
                btn: "Next: The Collision",
                action: async () => {
                    const node1 = createNode('node-alice', 'Alice', '25');
                    await animateNode(node1, 2, 10);
                }
            },
            {
                badge: "Phase 3: Linked List",
                title: "Handling Collisions",
                text: "Now we insert <code>map.put('Bob', 30)</code>. Uh oh! The math calculates Index 2 again! Instead of overwriting Alice, Bob attaches to Alice, forming a <span class='highlight'>Linked List</span>.",
                btn: "Next: Treeification",
                action: async () => {
                    const node2 = createNode('node-bob', 'Bob', '30');
                    await animateNode(node2, 2, 90); // Place 90px to the right of bucket
                    // Show connection line
                    document.getElementById('line-node-alice').style.opacity = '1';
                }
            },
            {
                badge: "Phase 4: Java 8 Feature",
                title: "Treeification (Red-Black)",
                text: "If hackers send 10,000 keys that all hash to Index 2, the Linked List becomes horribly slow O(n). To fix this, if a bucket hits 8 items, Java transforms it into a <span class='highlight'>Red-Black Tree</span> O(log n).",
                btn: "Next: Load Factor",
                action: async () => {
                    // Spawn a few fast nodes to simulate attack
                    for(let i=0; i<6; i++) {
                        const n = createNode(`n-atk-${i}`, `Hck${i}`, '00');
                        n.style.top = '10%'; n.style.left = '50%';
                        setTimeout(() => {
                            n.style.opacity = '1';
                            n.style.top = document.getElementById('bucket-2').offsetTop + 'px';
                            n.style.left = (150 + i*10) + 'px';
                        }, i*100);
                    }
                    await sleep(1000);
                    
                    // Transform to tree visually
                    nodes.forEach(n => {
                        if(n.id !== 'node-alice' && n.id !== 'node-bob') {
                            n.classList.add('tree-node');
                            n.innerHTML = '';
                        }
                    });
                    document.getElementById('node-alice').classList.add('tree-node');
                    document.getElementById('node-alice').innerHTML = '';
                    document.getElementById('node-bob').classList.add('tree-node');
                    document.getElementById('node-bob').innerHTML = '';
                    
                    // Position in a pyramid
                    const bTop = document.getElementById('bucket-2').offsetTop;
                    const baseL = 80;
                    
                    document.getElementById('node-alice').style.left = baseL + 40 + 'px';
                    document.getElementById('node-bob').style.left = baseL + 20 + 'px';
                    document.getElementById('node-bob').style.top = bTop + 30 + 'px';
                    
                    document.getElementById('n-atk-0').style.left = baseL + 60 + 'px';
                    document.getElementById('n-atk-0').style.top = bTop + 30 + 'px';
                    
                    document.getElementById('n-atk-1').style.left = baseL + 0 + 'px';
                    document.getElementById('n-atk-1').style.top = bTop + 60 + 'px';
                    
                    document.getElementById('n-atk-2').style.left = baseL + 40 + 'px';
                    document.getElementById('n-atk-2').style.top = bTop + 60 + 'px';

                    document.getElementById('n-atk-3').style.left = baseL + 80 + 'px';
                    document.getElementById('n-atk-3').style.top = bTop + 60 + 'px';
                    
                    // Hide lines
                    document.querySelectorAll('.ll-line').forEach(l => l.style.opacity = '0');
                }
            },
            {
                badge: "Phase 5: Resizing",
                title: "Load Factor (0.75)",
                text: "When the array gets 75% full, collisions become too frequent. Java creates a <span class='highlight'>brand new array double the size</span> (32), and recalculates the index for every single item (Rehashing).",
                btn: "Next: Fast Retrieval",
                action: async () => {
                    // Visually shrink current array, expand it
                    arrayContainer.style.transform = 'scale(0.8) translateY(-20px)';
                    await sleep(300);
                    initArray(14); // show more buckets to simulate resize
                    arrayContainer.style.transform = 'scale(0.8) translateY(-20px)';
                    
                    // Move nodes randomly to simulate rehashing
                    nodes.forEach((n, i) => {
                        const newIdx = Math.floor(Math.random() * 14);
                        const bRect = document.getElementById(`bucket-${newIdx}`).offsetTop;
                        n.style.top = bRect - 20 + 'px'; // adjust for scale
                        n.style.left = (60 + (i%2)*20) + 'px';
                    });
                }
            },
            {
                badge: "Phase 6: O(1) Speed",
                title: "Retrieving Data - Get()",
                text: "When you call <code>map.get('Alice')</code>, Java hashes 'Alice', jumps instantly to that specific array index in memory, and returns the value. No looping required! That's O(1) time.",
                btn: "Reset Demo",
                action: async () => {
                    // Reset hash box
                    hashFunctionBox.querySelector('.hf-math').innerText = 'hash("Alice") & 31 = 5';
                    
                    // Animate a beam finding the node
                    const beam = document.getElementById('query-beam');
                    const hRect = hashFunctionBox.getBoundingClientRect();
                    const cRect = document.getElementById('canvas').getBoundingClientRect();
                    
                    beam.style.top = (hRect.top - cRect.top + 20) + 'px';
                    beam.style.left = '50%';
                    beam.style.opacity = '1';
                    
                    await sleep(500);
                    
                    // Jump to a node
                    const targetNode = nodes[0]; // Just pick the first one visually
                    const tTop = targetNode.style.top;
                    const tLeft = targetNode.style.left;
                    
                    beam.style.transition = 'all 0.4s ease';
                    beam.style.top = tTop;
                    beam.style.left = tLeft;
                    
                    await sleep(400);
                    targetNode.style.boxShadow = '0 0 20px 10px rgba(56, 189, 248, 0.8)';
                    await sleep(800);
                    beam.style.opacity = '0';
                    beam.style.top = '10%';
                    beam.style.transition = 'none';
                }
            }
        ];

        async function nextStep() {
            if (isAnimating) return;
            
            if (currentStep >= steps.length) {
                // Hard Reset
                currentStep = 0; 
                nodesContainer.innerHTML = '';
                nodes = [];
                arrayContainer.innerHTML = '';
                arrayContainer.style.transform = 'none';
                hashFunctionBox.querySelector('.hf-math').innerText = 'hash(K) & (n-1)';
                
                badge.innerText = "[DATA_STRUCTURES]";
                title.innerText = "Under The Hood";
                text.innerHTML = "A HashMap is considered an O(1) data structure, meaning it finds items instantly. But it's not magic—it's just a heavily optimized array. Let's trace a <code>.put()</code> call.";
                btnNext.innerText = "Initialize Map";
                return;
            }

            isAnimating = true;
            btnNext.disabled = true;

            const stepData = steps[currentStep];
            
            badge.innerText = stepData.badge;
            title.innerText = stepData.title;
            text.innerHTML = stepData.text;
            btnNext.innerText = stepData.btn;

            await stepData.action();
            
            currentStep++;
            isAnimating = false;
            btnNext.disabled = false;
        }
    </script>
  <script type="module" src="../../js/topic.js"></script>
</body>
</html>
