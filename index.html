<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Java Learn — A comprehensive, structured guide to mastering Java from fundamentals to Spring Boot. Browse 25+ topics across Fundamentals, OOP, Core Java, Advanced, and Spring Boot." />
  <meta name="keywords" content="Java, Learn Java, OOP, Spring Boot, Collections, Multithreading, Java Tutorial" />
  <meta property="og:title" content="Java Learn — Master Java From Scratch" />
  <meta property="og:description" content="A modern, structured Java learning platform covering Fundamentals through Spring Boot." />
  <meta property="og:type" content="website" />
  <title>Java Learn — Master Java From Scratch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────────────────────── -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="index.html" class="header-logo" aria-label="Java Learn homepage">
        <span class="logo-icon">☕</span>
        <span class="logo-text">Java Learn</span>
      </a>

      <!-- Pathway Navigation Tabs -->
      <nav class="pathway-nav" id="pathway-nav" aria-label="Learning Pathways">
        <button class="pathway-tab active" data-pathway="dashboard" id="tab-dashboard">
          <span class="tab-icon">📊</span>
          <span class="tab-text">Dashboard</span>
        </button>
        <button class="pathway-tab" data-pathway="java" id="tab-java">
          <span class="tab-icon">☕</span>
          <span class="tab-text">Java</span>
        </button>
        <button class="pathway-tab" data-pathway="springboot" id="tab-springboot">
          <span class="tab-icon">🌱</span>
          <span class="tab-text">Spring Boot</span>
        </button>
        <button class="pathway-tab" data-pathway="aws" id="tab-aws">
          <span class="tab-icon">☁️</span>
          <span class="tab-text">AWS</span>
        </button>
        <button class="pathway-tab" data-pathway="kafka" id="tab-kafka">
          <span class="tab-icon">🐿️</span>
          <span class="tab-text">Kafka</span>
        </button>
        <button class="pathway-tab" data-pathway="microservices" id="tab-microservices">
          <span class="tab-icon">🕸️</span>
          <span class="tab-text">Microservices</span>
        </button>
        <button class="pathway-tab" data-pathway="studyplan" id="tab-studyplan">
          <span class="tab-icon">📅</span>
          <span class="tab-text">60-Day Plan</span>
        </button>
        <button class="pathway-tab" data-pathway="interview" id="tab-interview">
          <span class="tab-icon">💼</span>
          <span class="tab-text">Interview Prep</span>
        </button>
        <button class="pathway-tab" data-pathway="keytopics" id="tab-keytopics">
          <span class="tab-icon">🔑</span>
          <span class="tab-text">Key Topics</span>
        </button>
        <button class="pathway-tab" data-pathway="requestflow" id="tab-requestflow">
          <span class="tab-icon">🔄</span>
          <span class="tab-text">Request Flow</span>
        </button>
        <button class="pathway-tab" data-pathway="notes" id="tab-notes">
          <span class="tab-icon">📝</span>
          <span class="tab-text">My Notes</span>
        </button>
        <button class="pathway-tab" data-pathway="profile" id="tab-profile">
          <span class="tab-icon">👤</span>
          <span class="tab-text">Profile</span>
        </button>
      </nav>

      <div class="header-actions">
        <button id="header-search-btn" class="header-search-btn" aria-label="Search topics">
          <span>🔍</span>
        </button>
        <button id="theme-toggle" class="theme-toggle" aria-label="Switch to light mode">
          <span id="theme-icon">☀️</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ─── Layout: Sidebar + Main ───────────────────────────────────────────── -->
  <div class="home-layout">

    <!-- Category Sidebar -->
    <aside id="home-sidebar" aria-label="Category navigation">
      <!-- Rendered by app.js -->
    </aside>

    <!-- Main Content -->
    <main class="home-main" id="main-content">

      <!-- Hero -->
      <section class="hero" aria-labelledby="hero-heading">
        <div class="hero-eyebrow">☕ Java Learning Platform</div>
        <h1 class="hero-title" id="hero-heading">
          Master Java,<br>
          <span class="accent-text">One Topic at a Time</span>
        </h1>
        <p class="hero-subtitle">
          A structured, comprehensive guide from Java Fundamentals to Spring Boot.
          Track your progress and learn at your own pace.
        </p>

      </section>

      <!-- Progress Bar -->
      <div id="progress-container" aria-live="polite" aria-atomic="true">
        <!-- Rendered by app.js -->
      </div>

      <!-- Topics Grid (by category) -->
      <div id="topics-grid" aria-live="polite">
        <!-- Rendered by app.js -->
      </div>

    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
