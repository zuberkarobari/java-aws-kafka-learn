<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Java Learn — A comprehensive, structured guide to mastering Java from fundamentals to Spring Boot. Browse 25+ topics across Fundamentals, OOP, Core Java, Advanced, and Spring Boot." />
  <meta name="keywords" content="Java, Learn Java, OOP, Spring Boot, Collections, Multithreading, Java Tutorial" />
  <meta property="og:title" content="Java Learn — Master Java From Scratch" />
  <meta property="og:description" content="A modern, structured Java learning platform covering Fundamentals through Spring Boot." />
  <meta property="og:type" content="website" />
  <title>Java Learn — Master Java From Scratch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>

  <div class="dashboard-wrapper">
    <!-- 1. Left Sidebar -->
    <aside class="left-sidebar" id="left-sidebar">
      <div class="sidebar-logo-container">
        <a href="index.html" class="header-logo" aria-label="Java Learn homepage">
          <span class="logo-icon"><img src="https://upload.wikimedia.org/wikipedia/en/3/30/Java_programming_language_logo.svg" alt="Java Logo" width="28" height="28"></span>
          <span class="logo-text">Java Learn<br><small style="font-size:0.6rem; color:var(--text-muted); font-weight: normal;">Code. Learn. Grow.</small></span>
        </a>
      </div>

      <nav class="sidebar-nav" id="pathway-nav">
        <!-- We use pathway-nav ID so existing app.js tab click logic works -->
        <button class="sidebar-nav-item active pathway-tab" data-pathway="dashboard" id="tab-dashboard" title="Dashboard Overview">
          <span class="nav-icon">📊</span>
          <span class="nav-text">Dashboard</span>
        </button>

        <div class="nav-section-title" id="nav-paths-toggle" style="cursor: pointer; user-select: none;">Learning Paths <span style="float:right; transition: transform 0.2s;" id="nav-paths-icon">▼</span></div>
        <div class="nav-paths-list" id="nav-paths-content">
          <button class="sidebar-nav-subitem pathway-tab" data-pathway="java" id="tab-java" title="Java Fundamentals">
            <span class="nav-icon">☕</span> Java
          </button>
          <button class="sidebar-nav-subitem pathway-tab" data-pathway="springboot" id="tab-springboot" title="Spring Boot Framework">
            <span class="nav-icon">🌱</span> Spring Boot
          </button>
          <button class="sidebar-nav-subitem pathway-tab" data-pathway="microservices" id="tab-microservices" title="Microservices Architecture">
            <span class="nav-icon">🕸️</span> Microservices
          </button>
          <button class="sidebar-nav-subitem pathway-tab" data-pathway="kafka" id="tab-kafka" title="Apache Kafka">
            <span class="nav-icon">🐿️</span> Kafka
          </button>
          <button class="sidebar-nav-subitem pathway-tab" data-pathway="aws" id="tab-aws" title="Amazon Web Services">
            <span class="nav-icon">☁️</span> AWS
          </button>
        </div>

        <button class="sidebar-nav-item pathway-tab" data-pathway="interview" id="tab-interview" title="Interview Preparation">
          <span class="nav-icon">💼</span>
          <span class="nav-text">Interview Prep</span>
        </button>
        <button class="sidebar-nav-item pathway-tab" data-pathway="requestflow" id="tab-requestflow" title="System Request Flows">
          <span class="nav-icon">🔄</span>
          <span class="nav-text">Request Flows</span>
        </button>
        <button class="sidebar-nav-item pathway-tab" data-pathway="notes" id="tab-notes" title="Your Study Notes">
          <span class="nav-icon">📝</span>
          <span class="nav-text">Notes</span>
        </button>
        <button class="sidebar-nav-item pathway-tab" data-pathway="studyplan" id="tab-studyplan" title="Your Study Planner">
          <span class="nav-icon">📅</span>
          <span class="nav-text">Study Plan</span>
        </button>
        <button class="sidebar-nav-item pathway-tab" data-pathway="profile" id="tab-profile" title="Your Profile">
          <span class="nav-icon">👤</span>
          <span class="nav-text">Profile</span>
        </button>
        <button class="sidebar-nav-item" title="Settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-text">Settings</span>
        </button>
      </nav>

      <div class="go-pro-card">
        <span class="pro-icon">🚀</span>
        <h4 style="margin: 5px 0;">Go Pro</h4>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin: 0 0 10px 0;">Unlock advanced features, AI mentorship and more.</p>
        <button class="btn-upgrade">Upgrade Now</button>
      </div>

      <div class="theme-toggle-container" id="theme-toggle">
        <span class="theme-label"><span id="theme-icon">🌙</span> Dark Mode</span>
        <label class="toggle-switch">
          <input type="checkbox" id="theme-toggle-checkbox">
          <span class="slider round"></span>
        </label>
      </div>
    </aside>

    <!-- Floating Edge Toggles -->
    <button class="desktop-toggle-btn edge-toggle edge-toggle-left" id="desktop-left-toggle" title="Toggle Left Sidebar">
      <span class="icon">❮</span>
    </button>
    <button class="desktop-toggle-btn edge-toggle edge-toggle-right" id="desktop-right-toggle" title="Toggle Right Sidebar">
      <span class="icon">❯</span>
    </button>

    <!-- 2. Main Content Center -->
    <main class="main-content" id="main-content">
      <header class="main-topbar">
        <button class="hamburger-btn" id="hamburger-btn" style="display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; margin-right: 10px;">☰</button>
        <div class="search-wrap" style="flex: 1; max-width: 400px;">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search topics, paths or keywords...">
          <span class="search-shortcut">/</span>
        </div>
        <div class="topbar-actions">
          <div class="streak-badge">
            <span class="streak-fire">🔥</span>
            <span class="streak-count" id="header-streak-count">0</span> <span style="font-size: 0.8rem; font-weight: 500;">Day Streak</span>
          </div>
          <button class="notification-btn">
            <span class="bell-icon">🔔</span>
            <span class="notification-badge">3</span>
          </button>
          <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Zuber&background=f97316&color=fff" alt="User Avatar" class="avatar-img">
            <div class="user-info">
              <span class="user-name">Zuber</span>
              <span class="user-level" id="header-user-level">Level 1</span>
            </div>
            <span class="dropdown-icon">▼</span>
          </div>
        </div>
      </header>

      <!-- Old category sidebar (hidden in dashboard, shown for topics) -->
      <aside id="home-sidebar" aria-label="Category navigation" style="display:none;"></aside>
      
      <!-- Progress Bar (shown for topics) -->
      <div id="progress-container" aria-live="polite" aria-atomic="true"></div>

      <!-- Main Dynamic Grid -->
      <div id="topics-grid" aria-live="polite">
        <!-- Rendered by app.js -->
      </div>
    </main>

    <!-- 3. Right Sidebar -->
    <aside class="right-sidebar" id="right-sidebar">
      <!-- Rendered by app.js -->
    </aside>

  </div>

  <div class="mobile-overlay" id="mobile-overlay"></div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
